<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宅建演習ラベリングツール</title>
    <meta name="apple-mobile-web-app-title" content="宅ラベ">
    <link rel="apple-touch-icon" href="IMG_2202.png">
    <link rel="icon" type="image/png" href="IMG_2202.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 10px; margin: 0; padding-bottom: 50px; }
        
        /* タブシステム */
        .tab-container { display: flex; gap: 4px; margin-bottom: 15px; position: sticky; top: 0; z-index: 100; background: #121212; padding: 5px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tab { background: #333; color: #888; border: none; padding: 10px 15px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .tab.active { background: #00e5ff; color: #000; }

        .section-title { font-size: 0.85rem; color: #888; text-transform: uppercase; margin: 15px 0 5px 5px; border-left: 3px solid #00e5ff; padding-left: 10px; }
        .card { background: #1e1e1e; padding: 12px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-container { display: flex; flex-direction: column; align-items: center; position: relative; width: 100%; }
        .btn { border: none; border-radius: 8px; color: white; padding: 12px 5px; font-size: 0.85rem; font-weight: bold; cursor: pointer; width: 100%; -webkit-tap-highlight-color: transparent; }
        .minus-btn { background: #444; color: #fff; border-radius: 50%; width: 28px; height: 28px; border: 2px solid #222; margin-top: -12px; z-index: 10; font-size: 18px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .btn-o { background: #2e7d32; } .btn-t { background: #ef6c00; } .btn-q { background: #c62828; }
        .btn-audit { background: #37474f; font-size: 0.75rem; }
        .btn-om-large { background: #b71c1c; padding: 15px 5px; font-size: 1rem; }
        .count-display { font-size: 1.1rem; display: block; margin-bottom: 2px; pointer-events: none; }
        .alert { background: #b71c1c; color: white; padding: 8px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; font-size: 0.8rem; text-align: center; }
        .msg { background: #333; padding: 10px; border-radius: 8px; font-size: 0.8rem; margin-top: 10px; color: #ffeb3b; white-space: pre-line; }
        .note-area { width: 100%; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: #fff; padding: 10px; box-sizing: border-box; font-size: 0.85rem; margin-top: 8px; resize: none; min-height: 60px; }
        .report-btn { background: #007bff; width: 100%; margin-top: 15px; padding: 15px; font-size: 1rem; color: white; border: none; border-radius: 8px; font-weight: bold; }
        .reset-btn { background: #333; width: 100%; margin-top: 10px; padding: 8px; font-size: 0.7rem; color: #666; border: none; border-radius: 8px; }
        .stat-val { font-size: 2rem; color: #00e5ff; font-weight: bold; }
        .label-desc { font-size: 0.6rem; font-weight: normal; opacity: 0.8; display: block; margin-top: 2px; }
    </style>
</head>
<body onload="init()">

    <div class="tab-container">
        <button class="tab" onclick="switchTab('rights')">権利関係</button>
        <button class="tab" onclick="switchTab('business')">宅建業法</button>
        <button class="tab" onclick="switchTab('laws')">法令上の制限</button>
        <button class="tab" onclick="switchTab('tax')">税・その他</button>
    </div>

    <div id="status_alert" class="alert">⚠️ 演習開始！ポチポチして！</div>

    <div class="section-title">PHASE 1: 演習中 (感触)</div>
    <div class="card grid-3">
        <div class="btn-container">
            <button class="btn btn-o" onclick="inc('o')"><span class="count-display" id="o_v">0</span>○自信あり</button>
            <div class="minus-btn" onclick="dec('o', event)">－</div>
        </div>
        <div class="btn-container">
            <button class="btn btn-t" onclick="inc('t')"><span class="count-display" id="t_v">0</span>△確信無</button>
            <div class="minus-btn" onclick="dec('t', event)">－</div>
        </div>
        <div class="btn-container">
            <button class="btn btn-q" onclick="inc('q')"><span class="count-display" id="q_v">0</span>？？不明</button>
            <div class="minus-btn" onclick="dec('q', event)">－</div>
        </div>
    </div>

    <div class="section-title">PHASE 2: 結果内訳</div>
    <div class="card">
        <p style="font-size: 0.7rem; margin-bottom: 8px; color: #4caf50; font-weight: bold;">【○確信】だったのに外した「バグ」</p>
        <div class="btn-container">
            <button class="btn btn-om-large" onclick="inc('om')">
                <span class="count-display" id="om_v">0</span>
                ○ミス (最優先復習)
            </button>
            <div class="minus-btn" onclick="dec('om', event)">－</div>
        </div>
        <textarea id="om_notes" class="note-area" oninput="saveCurrent()" placeholder="なぜ間違えたか言語化しろ。"></textarea>
    </div>

    <div class="card grid-2">
        <div class="btn-container">
            <button class="btn btn-audit" onclick="inc('a')">
                <span class="count-display" id="a_v">0</span>a (完勝)
                <span class="label-desc">4肢全解明</span>
            </button>
            <div class="minus-btn" onclick="dec('a', event)">－</div>
        </div>
        <div class="btn-container">
            <button class="btn btn-audit" onclick="inc('b')">
                <span class="count-display" id="b_v">0</span>b (一撃)
                <span class="label-desc">消去法など</span>
            </button>
            <div class="minus-btn" onclick="dec('b', event)">－</div>
        </div>
    </div>

    <div class="card grid-2">
        <div class="btn-container">
            <button class="btn btn-audit" style="background:#283593;" onclick="inc('lucky')">
                <span class="count-display" id="lucky_v">0</span>ラッキー(△○)
            </button>
            <div class="minus-btn" onclick="dec('lucky', event)">－</div>
        </div>
        <div class="btn-container">
            <button class="btn btn-audit" style="background:#4527a0;" onclick="inc('super')">
                <span class="count-display" id="super_v">0</span>超ラッキー(?○)
            </button>
            <div class="minus-btn" onclick="dec('super', event)">－</div>
        </div>
        <div class="btn-container">
            <button class="btn btn-audit" onclick="inc('valid_x')">
                <span class="count-display" id="valid_x_v">0</span>実力ミス(△×)
            </button>
            <div class="minus-btn" onclick="dec('valid_x', event)">－</div>
        </div>
        <div class="btn-container">
            <button class="btn btn-audit" onclick="inc('growth')">
                <span class="count-display" id="growth_v">0</span>伸び代(?×)
            </button>
            <div class="minus-btn" onclick="dec('growth', event)">－</div>
        </div>
        <div id="feedback_msg" class="msg" style="display:none; grid-column: span 2;"></div>
    </div>

    <button class="report-btn" onclick="calculate()">分析完了</button>
    <button class="reset-btn" onclick="resetCurrent()">表示中の分野をリセット</button>

    <div id="report_area" class="card" style="display:none; text-align: center; border-top: 3px solid #00e5ff;">
        <div id="cat_name" style="color:#00e5ff; font-weight:bold; margin-bottom:10px;">分野</div>
        <div class="stat-val" id="gap_res">0%</div>
        <div style="color:#888; font-size: 0.8rem; margin-bottom: 10px;">ギャップ率</div>
        <div class="stat-val" id="mastery_res" style="color:#4caf50;">0%</div>
        <div style="color:#888; font-size: 0.8rem; margin-bottom: 15px;">実質正答率 (a+b)</div>
        <button class="report-btn" style="background: #00e5ff; color: #000;" onclick="copyReport()">報告をコピー</button>
    </div>

    <script>
        let currentCat = 'rights';
        const catNames = { rights: '権利関係', business: '宅建業法', laws: '法令上の制限', tax: '税・その他' };
        let allData = {
            rights: createSet(), business: createSet(), laws: createSet(), tax: createSet()
        };

        function createSet() { return { o:0, t:0, q:0, a:0, b:0, om:0, lucky:0, super:0, valid_x:0, growth:0, notes: "" }; }

        function init() {
            const saved = localStorage.getItem('takulabe_v6_data');
            if (saved) allData = JSON.parse(saved);
            switchTab('rights');
        }

        function switchTab(cat) {
            currentCat = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${cat}')"]`).classList.add('active');
            
            document.getElementById('om_notes').value = allData[cat].notes || "";
            document.getElementById('report_area').style.display = 'none';
            updateUI();
        }

        function saveCurrent() {
            allData[currentCat].notes = document.getElementById('om_notes').value;
            localStorage.setItem('takulabe_v6_data', JSON.stringify(allData));
        }

        function inc(k) { allData[currentCat][k]++; updateUI(); saveCurrent(); }
        function dec(k, e) { e.stopPropagation(); if (allData[currentCat][k] > 0) allData[currentCat][k]--; updateUI(); saveCurrent(); }

        function updateUI() {
            const data = allData[currentCat];
            Object.keys(data).forEach(k => {
                const el = document.getElementById(k+'_v');
                if(el) el.innerText = data[k];
            });

            let t1 = data.o + data.t + data.q;
            let t2 = data.a + data.b + data.om + data.lucky + data.super + data.valid_x + data.growth;
            let alertBox = document.getElementById('status_alert');
            let fbBox = document.getElementById('feedback_msg');

            if (t1 === 0) { alertBox.innerText = `⚠️ ${catNames[currentCat]}：演習開始！`; alertBox.style.background = "#b71c1c"; }
            else if (t1 > t2) { alertBox.innerText = `⚠️ あと ${t1 - t2} 件の内訳を！`; alertBox.style.background = "#ff9800"; }
            else if (t1 < t2) { alertBox.innerText = `⚠️ 内訳が ${t2 - t1} 件多い！`; alertBox.style.background = "#f44336"; }
            else { alertBox.innerText = `✅ ${catNames[currentCat]}：入力完了！`; alertBox.style.background = "#2e7d32"; }

            let msgs = [];
            if (data.super > 0) msgs.push("？→○：合ってると思うな！！！");
            if (data.growth > 0 || data.valid_x > 0) msgs.push("×：そりゃそう。インプットし直せ。");
            fbBox.style.display = msgs.length > 0 ? "block" : "none";
            fbBox.innerText = msgs.join("\n");
        }

        function calculate() {
            const data = allData[currentCat];
            let total = data.o + data.t + data.q;
            if (total === 0 || total !== (data.a + data.b + data.om + data.lucky + data.super + data.valid_x + data.growth)) {
                return alert("入力件数がズレています！");
            }
            let gap = ((data.om + data.lucky + data.super) / total * 100).toFixed(1);
            let mastery = ((data.a + data.b) / total * 100).toFixed(1);

            document.getElementById('cat_name').innerText = catNames[currentCat];
            document.getElementById('gap_res').innerText = gap + "%";
            document.getElementById('mastery_res').innerText = mastery + "%";
            document.getElementById('report_area').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }

        function resetCurrent() {
            if(confirm(`${catNames[currentCat]}のデータをリセットしますか？`)) {
                allData[currentCat] = createSet();
                document.getElementById('om_notes').value = "";
                saveCurrent();
                updateUI();
                document.getElementById('report_area').style.display = 'none';
            }
        }

        function copyReport() {
            const data = allData[currentCat];
            const gap = document.getElementById('gap_res').innerText;
            const mastery = document.getElementById('mastery_res').innerText;
            const notes = document.getElementById('om_notes').value;
            let text = `【宅ラベ：${catNames[currentCat]}】\nギャップ率：${gap}\n実質正答率：${mastery}\n\n【復習メモ】\n${notes || 'なし'}`;
            navigator.clipboard.writeText(text);
            alert(`${catNames[currentCat]}の報告をコピーしました！`);
        }
    </script>
</body>
</html>
