<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宅ラベ Ver.9.1</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDTvfK4bpsMXZPafP31I30_NCXv4hQ-UNY",
            authDomain: "takken-labeling-tool.firebaseapp.com",
            projectId: "takken-labeling-tool",
            storageBucket: "takken-labeling-tool.firebasestorage.app",
            messagingSenderId: "111683915060",
            appId: "1:111683915060:web:6817eeebc88aab53f36961",
            measurementId: "G-N0XSR446X9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.allData = { total: createSet(), rights: createSet(), business: createSet(), laws: createSet(), tax: createSet() };
        function createSet() { return { o:0, t:0, q:0, a:0, b:0, om:0, lucky:0, super:0, valid_x:0, growth:0, notes: "", q_notes: "" }; }

        // ログイン処理の結果をキャッチする（重要！）
        getRedirectResult(auth).then((result) => {
            if (result?.user) { console.log("Login Success:", result.user.displayName); }
        }).catch((error) => {
            // ここでエラーの内容を山口さんに教える
            alert("ログインに失敗しました：\n" + error.code + "\n" + error.message + "\n\n※Firebaseの承認済みドメイン設定を確認してください。");
        });

        onAuthStateChanged(auth, async (user) => {
            const status = document.getElementById('user_status');
            if (user) {
                status.innerText = user.displayName;
                document.getElementById('login_btn').style.display = 'none';
                document.getElementById('logout_btn').style.display = 'block';
                await loadFromServer(user.uid);
            } else {
                status.innerText = "未ログイン";
                document.getElementById('login_btn').style.display = 'block';
                document.getElementById('logout_btn').style.display = 'none';
                loadFromLocal();
            }
        });

        window.login = () => signInWithRedirect(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        window.saveData = async () => {
            localStorage.setItem('takulabe_v91_storage', JSON.stringify(window.allData));
            const user = auth.currentUser;
            if (user) {
                try { await setDoc(doc(db, "users", user.uid), { allData: window.allData, lastUpdated: new Date() }); } catch(e) { console.error(e); }
            }
        };

        function loadFromLocal() {
            const saved = localStorage.getItem('takulabe_v91_storage');
            if (saved) window.allData = JSON.parse(saved);
            window.updateUI();
        }

        async function loadFromServer(uid) {
            const docSnap = await getDoc(doc(db, "users", uid));
            if (docSnap.exists()) { window.allData = docSnap.data().allData; } else { loadFromLocal(); }
            window.updateUI();
        }

        // --- 以下、Ver.9.0と同じデザインとUIロジック ---
        // (省略せずに全コードを貼り付けてください)
    </script>
    </head>
