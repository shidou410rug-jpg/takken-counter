<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宅建演習ラベリングツール</title>
    <meta name="apple-mobile-web-app-title" content="宅ラベ">
    <link rel="apple-touch-icon" href="IMG_2202.png">
    <link rel="icon" type="image/png" href="IMG_2202.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 山口さんのFirebase設定を反映済み
        const firebaseConfig = {
            apiKey: "AIzaSyDTvfK4bpsMXZPafP31I30_NCXv4hQ-UNY",
            authDomain: "takken-labeling-tool.firebaseapp.com",
            projectId: "takken-labeling-tool",
            storageBucket: "takken-labeling-tool.firebasestorage.app",
            messagingSenderId: "111683915060",
            appId: "1:111683915060:web:6817eeebc88aab53f36961",
            measurementId: "G-N0XSR446X9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.allData = {
            total: createSet(), rights: createSet(), business: createSet(), laws: createSet(), tax: createSet()
        };

        function createSet() { return { o:0, t:0, q:0, a:0, b:0, om:0, lucky:0, super:0, valid_x:0, growth:0, notes: "" }; }

        onAuthStateChanged(auth, async (user) => {
            const info = document.getElementById('user_info');
            if (user) {
                info.innerText = user.displayName + " さん";
                document.getElementById('login_area').style.display = 'none';
                document.getElementById('logout_btn').style.display = 'block';
                await loadFromServer(user.uid);
            } else {
                info.innerText = "ログインで同期";
                document.getElementById('login_area').style.display = 'block';
                document.getElementById('logout_btn').style.display = 'none';
                loadFromLocal();
            }
        });

        window.login = () => signInWithPopup(auth, provider).catch(console.error);
        window.logout = () => signOut(auth);

        window.saveData = async () => {
            localStorage.setItem('takulabe_v81_final', JSON.stringify(window.allData));
            const user = auth.currentUser;
            if (user) {
                try { await setDoc(doc(db, "users", user.uid), { allData: window.allData, lastUpdated: new Date() }); } catch(e) { console.error(e); }
            }
        };

        function loadFromLocal() {
            const saved = localStorage.getItem('takulabe_v81_final');
            if (saved) window.allData = JSON.parse(saved);
            window.updateUI();
        }

        async function loadFromServer(uid) {
            const docSnap = await getDoc(doc(db, "users", uid));
            if (docSnap.exists()) { window.allData = docSnap.data().allData; } else { loadFromLocal(); }
            window.updateUI();
        }

        window.updateUI = () => {
            if (window.currentCat === 'dash') { renderDashboard(); return; }
            const d = window.allData[window.currentCat];
            ['o','t','q','om','a','b','lucky'].forEach(k => {
                const el = document.getElementById(k+'_v');
                if(el) el.innerText = d[k];
            });
            document.getElementById('cat_notes').value = d.notes || "";
            document.getElementById('status_alert').innerText = `【${catNames[window.currentCat]}】を記録中`;
        };
    </script>

    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 5px; margin: 0; padding-bottom: 80px; font-size: 0.9rem; }
        .auth-bar { background: #1e1e1e; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; }
        .login-btn { background: #00e5ff; color: #000; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; }
        .tab-container { display: flex; gap: 4px; margin-bottom: 10px; position: sticky; top: 0; z-index: 100; background: #121212; padding: 5px 0; overflow-x: auto; }
        .tab { background: #333; color: #aaa; border: none; padding: 8px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; white-space: nowrap; }
        .tab.active { background: #00e5ff; color: #000; }
        .section-title { font-size: 0.8rem; color: #999; margin: 10px 0 5px 5px; border-left: 3px solid #00e5ff; padding-left: 8px; }
        .card { background: #1e1e1e; padding: 12px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }
        .btn-container { display: flex; flex-direction: column; align-items: center; position: relative; width: 100%; }
        .btn { border: none; border-radius: 8px; color: white; padding: 10px 2px; font-size: 0.8rem; font-weight: bold; width: 100%; }
        .minus-btn { background: #444; color: #fff; border-radius: 50%; width: 24px; height: 24px; border: 1px solid #222; margin-top: -10px; z-index: 10; display: flex; justify-content: center; align-items: center; font-size: 14px; }
        .btn-o { background: #2e7d32; } .btn-t { background: #ef6c00; } .btn-q { background: #c62828; }
        .btn-audit { background: #37474f; font-size: 0.7rem; }
        .stat-val { font-size: 2rem; color: #00e5ff; font-weight: bold; }
        .note-area { width: 100%; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: #fff; padding: 8px; box-sizing: border-box; font-size: 0.85rem; margin-top: 5px; min-height: 60px; }
        .dash-scroll { overflow-x: auto; margin-top: 5px; border-radius: 8px; }
        .dashboard-table { width: 100%; border-collapse: collapse; font-size: 0.65rem; min-width: 450px; background: #1e1e1e; }
        .dashboard-table th, .dashboard-table td { border: 1px solid #333; padding: 8px 4px; text-align: center; }
        .dashboard-table th { background: #263238; color: #888; white-space: nowrap; }
        .row-total { background: #263238; font-weight: bold; color: #00e5ff; }
        .highlight { color: #00e5ff; font-weight: bold; }
        .report-btn { background: #007bff; width: 100%; margin-top: 10px; padding: 12px; font-size: 0.9rem; color: white; border: none; border-radius: 8px; font-weight: bold; }
        .reset-btn { background: #222; width: 100%; margin-top: 20px; padding: 8px; font-size: 0.7rem; color: #555; border: none; }
    </style>
</head>
<body onload="init()">

    <div class="auth-bar">
        <span id="user_info">読み込み中...</span>
        <div id="login_area"><button class="login-btn" onclick="login()">Googleログイン</button></div>
        <button id="logout_btn" onclick="logout()" style="display:none; background:none; border:none; color:#777;">ログアウト</button>
    </div>

    <div class="tab-container">
        <button class="tab" onclick="switchTab('dash')">📊 総合集計</button>
        <button class="tab" onclick="switchTab('total')">全範囲</button>
        <button class="tab" onclick="switchTab('rights')">権利関係</button>
        <button class="tab" onclick="switchTab('business')">宅建業法</button>
        <button class="tab" onclick="switchTab('laws')">法令上の制限</button>
        <button class="tab" onclick="switchTab('tax')">税・その他</button>
    </div>

    <div id="view_dash" style="display:none;">
        <div class="section-title">全分野・総力分析</div>
        <div class="card" style="padding: 10px 5px;">
            <div style="text-align:center; margin-bottom:10px;">
                <div class="stat-val" id="total_mastery">0%</div>
                <div style="color:#888; font-size: 0.75rem;">トータル実質正答率 (a+b)</div>
            </div>
            <div class="dash-scroll">
                <table class="dashboard-table">
                    <thead>
                        <tr>
                            <th>分野</th><th>○自信</th><th>△/?</th><th>a</th><th>b</th><th>○ミス</th><th>運</th><th>a+b</th><th>率</th>
                        </tr>
                    </thead>
                    <tbody id="dash_body"></tbody>
                    <tfoot id="dash_foot"></tfoot>
                </table>
            </div>
        </div>
    </div>

    <div id="view_input">
        <div id="status_alert" class="card" style="background:#37474f; text-align:center; padding:8px; font-weight:bold; font-size:0.75rem;">カテゴリを選択してください</div>
        <div class="section-title">PHASE 1: 演習中</div>
        <div class="card grid-3">
            <div class="btn-container"><button class="btn btn-o" onclick="inc('o')"><span id="o_v">0</span>自信あり</button><div class="minus-btn" onclick="dec('o', event)">－</div></div>
            <div class="btn-container"><button class="btn btn-t" onclick="inc('t')"><span id="t_v">0</span>確信無</button><div class="minus-btn" onclick="dec('t', event)">－</div></div>
            <div class="btn-container"><button class="btn btn-q" onclick="inc('q')"><span id="q_v">0</span>不明</button><div class="minus-btn" onclick="dec('q', event)">－</div></div>
        </div>
        <div class="section-title">PHASE 2: 結果内訳</div>
        <div class="card grid-4">
            <div class="btn-container"><button class="btn btn-audit" style="background:#b71c1c;" onclick="inc('om')"><span id="om_v">0</span>○ミス</button><div class="minus-btn" onclick="dec('om', event)">－</div></div>
            <div class="btn-container"><button class="btn btn-audit" onclick="inc('a')"><span id="a_v">0</span>a完勝</button><div class="minus-btn" onclick="dec('a', event)">－</div></div>
            <div class="btn-container"><button class="btn btn-audit" onclick="inc('b')"><span id="b_v">0</span>b一撃</button><div class="minus-btn" onclick="dec('b', event)">－</div></div>
            <div class="btn-container"><button class="btn btn-audit" style="background:#283593;" onclick="inc('lucky')"><span id="lucky_v">0</span>運/△○</button><div class="minus-btn" onclick="dec('lucky', event)">－</div></div>
        </div>
        <div class="section-title">学習メモ (自由記述)</div>
        <div class="card"><textarea id="cat_notes" class="note-area" oninput="saveNotes()" placeholder="気づいたことをメモしましょう"></textarea></div>
        <button class="report-btn" onclick="calculate()">分析結果を表示</button>
        <div id="report_area" class="card" style="display:none; text-align: center; border-top: 3px solid #00e5ff;">
            <div class="stat-val" id="res_mastery">0%</div>
            <button class="report-btn" style="background:#00e5ff; color:#000;" onclick="copyReport()">報告をコピー</button>
        </div>
        <button class="reset-btn" onclick="resetCurrent()">表示中のカテゴリをリセット</button>
    </div>

    <script>
        window.currentCat = 'dash';
        const catNames = { total:'全範囲', rights:'権利関係', business:'宅建業法', laws:'法令上の制限', tax:'税・その他' };

        function init() { switchTab('dash'); }

        function switchTab(cat) {
            window.currentCat = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const activeTab = document.querySelector(`[onclick="switchTab('${cat}')"]`);
            if (activeTab) activeTab.classList.add('active');
            if (cat === 'dash') {
                document.getElementById('view_dash').style.display = 'block';
                document.getElementById('view_input').style.display = 'none';
                renderDashboard();
            } else {
                document.getElementById('view_dash').style.display = 'none';
                document.getElementById('view_input').style.display = 'block';
                document.getElementById('report_area').style.display = 'none';
                window.updateUI();
            }
        }

        function inc(k) { window.allData[window.currentCat][k]++; window.updateUI(); window.saveData(); }
        function dec(k, e) { e.stopPropagation(); if (window.allData[window.currentCat][k] > 0) window.allData[window.currentCat][k]--; window.updateUI(); window.saveData(); }
        function saveNotes() { window.allData[window.currentCat].notes = document.getElementById('cat_notes').value; window.saveData(); }

        function renderDashboard() {
            const body = document.getElementById('dash_body');
            const foot = document.getElementById('dash_foot');
            body.innerHTML = ""; foot.innerHTML = "";
            let sums = { o:0, tq:0, a:0, b:0, om:0, lucky:0, ab:0, total:0 };

            Object.keys(catNames).forEach(key => {
                const d = window.allData[key];
                const total = d.o + d.t + d.q;
                const ab = d.a + d.b;
                const rate = total > 0 ? ((ab / total) * 100).toFixed(1) : "0";
                sums.o += d.o; sums.tq += (d.t + d.q); sums.a += d.a; sums.b += d.b;
                sums.om += d.om; sums.lucky += d.lucky; sums.ab += ab; sums.total += total;
                body.innerHTML += `<tr><td>${catNames[key]}</td><td>${d.o}</td><td>${d.t + d.q}</td><td>${d.a}</td><td>${d.b}</td><td>${d.om}</td><td>${d.lucky}</td><td class="highlight">${ab}</td><td>${rate}%</td></tr>`;
            });

            const totalRate = sums.total > 0 ? ((sums.ab / sums.total) * 100).toFixed(1) : "0";
            document.getElementById('total_mastery').innerText = totalRate + "%";
            foot.innerHTML = `<tr class="row-total"><td>TOTAL</td><td>${sums.o}</td><td>${sums.tq}</td><td>${sums.a}</td><td>${sums.b}</td><td>${sums.om}</td><td>${sums.lucky}</td><td>${sums.ab}</td><td>${totalRate}%</td></tr>`;
        }

        function calculate() {
            const d = window.allData[window.currentCat];
            const total = d.o + d.t + d.q;
            if (total === 0) return alert("データがありません");
            document.getElementById('res_mastery').innerText = ((d.a + d.b) / total * 100).toFixed(1) + "%";
            document.getElementById('report_area').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }

        function copyReport() {
            const rate = document.getElementById('res_mastery').innerText;
            const text = `【宅ラベ：${catNames[window.currentCat]}】\n実質正答率：${rate}\nメモ：${window.allData[window.currentCat].notes || 'なし'}`;
            navigator.clipboard.writeText(text); alert("コピー完了！");
        }

        function resetCurrent() {
            if(confirm("リセットしますか？")) {
                window.allData[window.currentCat] = { o:0, t:0, q:0, a:0, b:0, om:0, lucky:0, super:0, valid_x:0, growth:0, notes: "" };
                window.saveData(); window.updateUI();
            }
        }
    </script>
</body>
</html>
